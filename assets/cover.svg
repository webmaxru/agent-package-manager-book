<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="The Missing Package Manager — Managing AI Agent Context with APM. By Maxim Salnikov (Microsoft). Interactive, open-source, free.">
  <defs>
    <!-- Light hero wash: a faint indigo tint at the top fading to the page bg,
         mirroring .site-header's linear-gradient(indigo 6%, bg). -->
    <linearGradient id="wash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDEDFA"/>
      <stop offset="0.55" stop-color="#F6F7FB"/>
      <stop offset="1" stop-color="#F6F7FB"/>
    </linearGradient>
    <radialGradient id="glowIndigo" cx="0.06" cy="0.05" r="0.6">
      <stop offset="0" stop-color="#5A54F0" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#5A54F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMagenta" cx="0.98" cy="0.96" r="0.5">
      <stop offset="0" stop-color="#C2468A" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#C2468A" stop-opacity="0"/>
    </radialGradient>
    <!-- Four-property spectrum: portability · reproducibility · security · governance -->
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5A54F0"/>
      <stop offset="0.34" stop-color="#0EA5A5"/>
      <stop offset="0.67" stop-color="#B87613"/>
      <stop offset="1" stop-color="#C2468A"/>
    </linearGradient>
    <linearGradient id="indigoBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5A54F0"/>
      <stop offset="1" stop-color="#8B84FF"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#171A2D" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Page surface -->
  <rect width="1200" height="630" fill="url(#wash)"/>
  <rect width="1200" height="630" fill="url(#glowIndigo)"/>
  <rect width="1200" height="630" fill="url(#glowMagenta)"/>
  <!-- Top signature: the four-property spectrum -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#spectrum)"/>

  <!-- ============================================ Left column: identity -->
  <text x="80" y="118" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" font-weight="600" letter-spacing="4" fill="#5A6478">INTERACTIVE&#160;&#160;·&#160;&#160;OPEN-SOURCE&#160;&#160;·&#160;&#160;FREE</text>

  <text x="76" y="206" font-family="'Bricolage Grotesque', 'Segoe UI', system-ui, sans-serif" font-size="70" font-weight="800" letter-spacing="-2" fill="#171A22">The Missing</text>
  <text x="76" y="288" font-family="'Bricolage Grotesque', 'Segoe UI', system-ui, sans-serif" font-size="70" font-weight="800" letter-spacing="-2" fill="#171A22">Package Manager</text>

  <text x="80" y="342" font-family="Literata, Georgia, 'Times New Roman', serif" font-size="27" font-weight="500" fill="#4A5468">Managing AI Agent Context with APM</text>

  <!-- Four-property line, each word in its property color -->
  <text x="80" y="404" font-family="'IBM Plex Mono', Consolas, monospace" font-size="20" font-weight="600"><tspan fill="#4A43E0">Portable</tspan><tspan fill="#8A93A8">&#160;&#160;·&#160;&#160;</tspan><tspan fill="#0B8B8B">Reproducible</tspan><tspan fill="#8A93A8">&#160;&#160;·&#160;&#160;</tspan><tspan fill="#8F5A0C">Secure</tspan><tspan fill="#8A93A8">&#160;&#160;·&#160;&#160;</tspan><tspan fill="#B0417E">Governed</tspan></text>

  <text x="80" y="442" font-family="Literata, Georgia, 'Times New Roman', serif" font-size="18" font-weight="400" fill="#6B7488">12 chapters · verified against the real apm CLI</text>

  <!-- Author -->
  <text x="80" y="506" font-family="'Bricolage Grotesque', 'Segoe UI', system-ui, sans-serif" font-size="23" font-weight="700" fill="#171A22">Maxim Salnikov<tspan font-family="Literata, Georgia, serif" font-weight="400" fill="#5A6478" font-size="21">&#160;&#160;·&#160;&#160;Microsoft</tspan></text>

  <!-- URL -->
  <rect x="80" y="528" width="64" height="3" rx="1.5" fill="url(#indigoBar)"/>
  <text x="80" y="574" font-family="'IBM Plex Mono', Consolas, monospace" font-size="23" font-weight="600" fill="#4A43E0">apm.isainative.dev</text>

  <!-- ==================================== Right column: apm.yml manifest -->
  <!-- Card body (dark "ink" surface, as on the site even in light theme) -->
  <rect x="724" y="148" width="416" height="342" rx="14" fill="#10141F" filter="url(#cardShadow)"/>
  <!-- Header bar (ink-2), top corners only -->
  <path d="M724 162 a14 14 0 0 1 14 -14 h388 a14 14 0 0 1 14 14 v30 h-416 z" fill="#171D2C"/>
  <line x1="724" y1="192" x2="1140" y2="192" stroke="#262E44" stroke-width="1"/>
  <rect x="724.5" y="148.5" width="415" height="341" rx="13.5" fill="none" stroke="#2B3448" stroke-width="1"/>

  <!-- Header: file icon + filename + resolved stamp -->
  <rect x="745" y="163" width="18" height="18" rx="5" fill="#9E98FF" opacity="0.20"/>
  <rect x="748" y="166" width="12" height="12" rx="3" fill="#9E98FF"/>
  <text x="774" y="176" font-family="'IBM Plex Mono', Consolas, monospace" font-size="14.5" fill="#E6EAF6">apm.yml</text>
  <text x="1116" y="176" text-anchor="end" font-family="'IBM Plex Mono', Consolas, monospace" font-size="14" fill="#E7B23D">&#10003; resolved</text>

  <!-- Code (token colors mirror .tok-* on the site) -->
  <g font-family="'IBM Plex Mono', Consolas, monospace" font-size="15">
    <text x="748" y="223" fill="#9AA6C0" font-style="italic"># your agent&#8217;s context, declared</text>
    <text x="748" y="248"><tspan fill="#E7B23D">name</tspan><tspan fill="#D8DEEC">:</tspan><tspan fill="#9E98FF"> meridian-checkout</tspan></text>
    <text x="748" y="273"><tspan fill="#E7B23D">version</tspan><tspan fill="#D8DEEC">:</tspan><tspan fill="#E7B23D" font-weight="600"> 1.4.0</tspan></text>
    <text x="748" y="323"><tspan fill="#E7B23D">dependencies</tspan><tspan fill="#D8DEEC">:</tspan></text>
    <text x="748" y="348"><tspan fill="#9E98FF">&#160;&#160;microsoft/apm-sample-package</tspan><tspan fill="#D8DEEC">:</tspan><tspan fill="#E7B23D" font-weight="600"> ^1.2.0</tspan></text>
    <text x="748" y="373"><tspan fill="#9E98FF">&#160;&#160;meridian/review-prompts</tspan><tspan fill="#D8DEEC">:</tspan><tspan fill="#E7B23D" font-weight="600"> 3.1.0</tspan></text>
    <text x="748" y="398"><tspan fill="#9E98FF">&#160;&#160;meridian/money-skill</tspan><tspan fill="#E7B23D" font-weight="600">#main</tspan><tspan fill="#D8DEEC">:</tspan><tspan fill="#E7B23D" font-weight="600"> latest</tspan></text>
    <text x="748" y="448"><tspan fill="#E7B23D">targets</tspan><tspan fill="#D8DEEC">: [</tspan><tspan fill="#5BD6CF">copilot</tspan><tspan fill="#D8DEEC">, </tspan><tspan fill="#5BD6CF">claude</tspan><tspan fill="#D8DEEC">, </tspan><tspan fill="#5BD6CF">cursor</tspan><tspan fill="#D8DEEC">]</tspan></text>
  </g>
</svg>
