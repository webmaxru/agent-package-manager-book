<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="The Missing Package Manager — Managing AI Agent Context with APM. Interactive, open-source, free.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="1" stop-color="#141f38"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.16" cy="0.12" r="0.55">
      <stop offset="0" stop-color="#3a63ff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#3a63ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.96" cy="0.92" r="0.5">
      <stop offset="0" stop-color="#8f6bff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#8f6bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#9a7bff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Left column: title + messaging -->
  <text x="80" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3.5" fill="#8091b5">INTERACTIVE  ·  OPEN-SOURCE  ·  FREE</text>

  <text x="76" y="212" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#f3f6ff">The Missing</text>
  <text x="76" y="296" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#f3f6ff">Package Manager</text>

  <text x="80" y="352" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="29" font-weight="500" fill="#aeb9d8">Managing AI Agent Context with APM</text>

  <text x="80" y="416" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#8492b3"><tspan fill="#6f9bff">Portable</tspan> by manifest  ·  <tspan fill="#6f9bff">Secure</tspan> by default  ·  <tspan fill="#6f9bff">Governed</tspan> by policy</text>

  <text x="80" y="452" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#5f6f92">12 chapters · verified against the real apm CLI</text>

  <rect x="80" y="500" width="70" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="80" y="556" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="23" font-weight="600" fill="#7fa6ff">webmaxru.github.io/agent-package-manager-book</text>

  <!-- Right column: apm.yml manifest card -->
  <rect x="742" y="150" width="392" height="340" rx="18" fill="#0d1526" stroke="#28344f" stroke-width="1.5"/>
  <circle cx="776" cy="188" r="6" fill="#ff5f57"/>
  <circle cx="798" cy="188" r="6" fill="#febc2e"/>
  <circle cx="820" cy="188" r="6" fill="#28c840"/>
  <text x="1110" y="193" text-anchor="end" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="15" fill="#5c6b8a">apm.yml</text>
  <line x1="758" y1="214" x2="1118" y2="214" stroke="#1f2a44" stroke-width="1"/>

  <text x="766" y="258" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="18"><tspan fill="#7aa2ff">name</tspan><tspan fill="#c8d3ee">:</tspan><tspan fill="#9ece9e"> meridian-checkout</tspan></text>
  <text x="766" y="291" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="18"><tspan fill="#7aa2ff">version</tspan><tspan fill="#c8d3ee">:</tspan><tspan fill="#9ece9e"> 0.1.0</tspan></text>
  <text x="766" y="324" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="18"><tspan fill="#7aa2ff">targets</tspan><tspan fill="#c8d3ee">: [</tspan><tspan fill="#9ece9e">copilot, claude</tspan><tspan fill="#c8d3ee">]</tspan></text>
  <text x="766" y="357" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="18"><tspan fill="#7aa2ff">dependencies</tspan><tspan fill="#c8d3ee">:</tspan></text>
  <text x="766" y="390" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="18"><tspan fill="#7aa2ff">  apm</tspan><tspan fill="#c8d3ee">: [</tspan><tspan fill="#9ece9e">meridian-standards</tspan><tspan fill="#c8d3ee">]</tspan></text>
  <text x="766" y="423" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="18"><tspan fill="#7aa2ff">includes</tspan><tspan fill="#c8d3ee">:</tspan><tspan fill="#9ece9e"> auto</tspan></text>
  <text x="766" y="462" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="17" fill="#5c6b8a"># one install, every harness</text>
</svg>
