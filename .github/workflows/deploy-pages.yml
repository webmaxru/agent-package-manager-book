name: Deploy book to GitHub Pages

# Builds the static APM book from content/toc.yml + content/chapters/ fragments
# via site/generate.py (which also renders the downloadable site/apm-book.pdf),
# then publishes site/ to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml playwright

      - name: Install Chromium for PDF rendering
        run: python -m playwright install --with-deps chromium

      - name: Generate site + PDF from content/toc.yml
        run: python site/generate.py
        env:
          # Public, write-only Application Insights client key — injected at build
          # time as a repo *variable* (not a secret). Set with:
          #   gh variable set APPINSIGHTS_CONNECTION_STRING --body "InstrumentationKey=...".
          # If unset, the cookieless beacon is a safe no-op (no telemetry).
          APPINSIGHTS_CONNECTION_STRING: ${{ vars.APPINSIGHTS_CONNECTION_STRING }}
          # Rebuild the downloadable PDF on every deploy and fail loudly if the
          # PDF toolchain (Playwright + Chromium, installed above) is unavailable,
          # so the published site never ships a stale or missing PDF.
          APM_PDF_REQUIRED: "1"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
